<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#1677ff"/>
  
  <!-- Camera body -->
  <rect x="18" y="35" width="64" height="42" rx="8" fill="white"/>
  
  <!-- Camera bump (top) -->
  <rect x="35" y="28" width="22" height="12" rx="4" fill="white"/>
  
  <!-- Lens outer -->
  <circle cx="50" cy="56" r="14" fill="#1677ff"/>
  
  <!-- Lens inner -->
  <circle cx="50" cy="56" r="9" fill="white" opacity="0.9"/>
  
  <!-- Lens center -->
  <circle cx="50" cy="56" r="4" fill="#1677ff"/>
  
  <!-- Flash dot -->
  <circle cx="72" cy="44" r="3" fill="#1677ff"/>
</svg>
